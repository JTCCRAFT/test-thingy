<!DOCTYPE html>
<html lang="en">
  <head>
    <title>PB95 Test v1</title>
    <style>
      /* Page background is now the classic desktop teal */
      body {
        background-color: #008080;
        margin: 0;
        padding: 50px;
        font-family: "Tahoma", "MS Sans Serif", Arial, sans-serif;
      }

      /* This container gives the page a "Window" look */
      .browser-window {
        background-color: #d4d0c8;
        border: 2px outset #ffffff;
        padding: 2px;
        width: 300px;
        margin: 0 auto;
      }

      /* The top bar of a browser window */
      .title-bar {
        background: linear-gradient(90deg, #001a70, #4386fc);
        color: white;
        padding: 3px 5px;
        font-size: 12px;
        font-weight: bold;
        margin-bottom: 10px;
      }

      .content {
        padding: 20px;
      }

      #button1 {
        font-family: "Tahoma", "MS Sans Serif", Arial, sans-serif;
        font-size: 11px;
        color: #000000;
        background-color: #d4d0c8;
        padding: 4px 12px;
        border-top: 1.5px solid #ffffff;
        border-left: 1.5px solid #ffffff;
        border-right: 1.5px solid #808080;
        border-bottom: 1.5px solid #808080;
        box-shadow: inset 1px 1px 0px #ffffff, inset -1px -1px 0px #0a0a0a;
        cursor: default;
      }

      #button1:active {
        border-top: 1.5px solid #808080;
        border-left: 1.5px solid #808080;
        border-right: 1.5px solid #ffffff;
        border-bottom: 1.5px solid #ffffff;
        box-shadow: inset 1px 1px 0px #0a0a0a;
        padding: 5px 11px 3px 13px;
      }
    </style>
  </head>
  <body>

    <div class="browser-window">
      <div class="title-bar">PB95 Test - Internet Explorer</div>
      <div class="content">
        <button type="button" id="button1" onclick="this.style.display='none'">Bonus</button>
      </div>
    </div>

  </body>
</html>
